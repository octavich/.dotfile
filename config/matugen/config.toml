[general]
[config]
version_check = false

[templates.fuzzel]
input_path = '~/.config/matugen/templates/fuzzel/fuzzel_theme.ini'
output_path = '~/.config/fuzzel/fuzzel_theme.ini'

[templates.gtk3]
input_path = '~/.config/matugen/templates/gtk/gtk-colors.css'
output_path = '~/.config/gtk-3.0/colors.css'

[templates.gtk4]
input_path = '~/.config/matugen/templates/gtk4/gtk-colors.css'
output_path = '~/.config/gtk-4.0/colors.css'

[templates.master_colors]
input_path = '~/.config/matugen/templates/colors.conf.template'
output_path = '~/.config/colors.conf'
post_hook = '~/.config/apply-theme.sh'

[templates.vesktop]
input_path = '~/.config/matugen/templates/discord/midnight-discord.css'
output_path = '~/.config/Equicord/themes/midnight-discord.css'
